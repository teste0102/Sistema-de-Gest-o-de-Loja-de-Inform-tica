version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: loja_postgres
    environment:
      POSTGRES_DB: loja_informatica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loja_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (gerenciar BD via web)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: loja_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@loja.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - loja_network

volumes:
  postgres_data:

networks:
  loja_network:
    driver: bridge
