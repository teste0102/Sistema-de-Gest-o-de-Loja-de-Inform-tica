version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: loja_postgres
    environment:
      POSTGRES_DB: loja_informatica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loja_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (gerenciar BD via web)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: loja_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@loja.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - loja_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loja_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/loja_informatica
      MDB_DIR: /dados_mdb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - loja_network
    volumes:
      # Pasta dos arquivos Access (.mdb) do sistema antigo, somente leitura.
      # Defina MDB_PATH no .env (ex.: MDB_PATH=C:\Users\User\Desktop\Informatica2023
      # ou uma pasta de rede mapeada). Padrão: ./mdb_data
      - "${MDB_PATH:-./mdb_data}:/dados_mdb:ro"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loja_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      BROWSER: none
    depends_on:
      - backend
    networks:
      - loja_network

volumes:
  postgres_data:

networks:
  loja_network:
    driver: bridge
